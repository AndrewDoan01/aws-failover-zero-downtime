name: Deploy Environment

on:
  push:
    branches:
      - main
    paths:
      - deploy/versions/test.json
      - deploy/versions/staging.json
      - deploy/versions/prod.json
      - .github/workflows/deploy-env.yml
      - .github/workflows/deploy-job.yml
      - .github/scripts/**
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - test
          - staging
          - prod
      target_cluster:
        description: Target cluster for deployment/failover
        required: true
        type: choice
        default: primary
        options:
          - primary
          - secondary

permissions:
  contents: read
  id-token: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      test: ${{ steps.filter.outputs.test }}
      staging: ${{ steps.filter.outputs.staging }}
      prod: ${{ steps.filter.outputs.prod }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect env version changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            test:
              - deploy/versions/test.json
            staging:
              - deploy/versions/staging.json
            prod:
              - deploy/versions/prod.json

  deploy-test:
    needs: detect-changes
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.environment == 'test') || (github.event_name == 'push' && needs.detect-changes.outputs.test == 'true') }}
    uses: ./.github/workflows/deploy-job.yml
    with:
      environment_name: test
      deploy_target: ${{ github.event_name == 'workflow_dispatch' && inputs.target_cluster || 'primary' }}
      aws_region: ${{ (github.event_name == 'workflow_dispatch' && inputs.target_cluster == 'secondary') && vars['SECONDARY_AWS_REGION'] || vars['PRIMARY_AWS_REGION'] }}
      eks_cluster_name: ${{ (github.event_name == 'workflow_dispatch' && inputs.target_cluster == 'secondary') && vars['SECONDARY_EKS_CLUSTER_NAME'] || vars['PRIMARY_EKS_CLUSTER_NAME'] }}
    secrets:
      aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
      discord_webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
      grafana_admin_password: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}

  deploy-staging:
    needs: detect-changes
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging') || (github.event_name == 'push' && needs.detect-changes.outputs.staging == 'true') }}
    uses: ./.github/workflows/deploy-job.yml
    with:
      environment_name: staging
      deploy_target: ${{ github.event_name == 'workflow_dispatch' && inputs.target_cluster || 'primary' }}
      aws_region: ${{ (github.event_name == 'workflow_dispatch' && inputs.target_cluster == 'secondary') && vars['SECONDARY_AWS_REGION'] || vars['PRIMARY_AWS_REGION'] }}
      eks_cluster_name: ${{ (github.event_name == 'workflow_dispatch' && inputs.target_cluster == 'secondary') && vars['SECONDARY_EKS_CLUSTER_NAME'] || vars['PRIMARY_EKS_CLUSTER_NAME'] }}
    secrets:
      aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
      discord_webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
      grafana_admin_password: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
  deploy-prod:
    needs: detect-changes
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.environment == 'prod') || (github.event_name == 'push' && needs.detect-changes.outputs.prod == 'true') }}
    uses: ./.github/workflows/deploy-job.yml
    with:
      environment_name: prod
      deploy_target: ${{ github.event_name == 'workflow_dispatch' && inputs.target_cluster || 'primary' }}
      aws_region: ${{ (github.event_name == 'workflow_dispatch' && inputs.target_cluster == 'secondary') && vars['SECONDARY_AWS_REGION'] || vars['PRIMARY_AWS_REGION'] }}
      eks_cluster_name: ${{ (github.event_name == 'workflow_dispatch' && inputs.target_cluster == 'secondary') && vars['SECONDARY_EKS_CLUSTER_NAME'] || vars['PRIMARY_EKS_CLUSTER_NAME'] }}
      change_window_start: ${{ vars.PROD_CHANGE_WINDOW_START_UTC }}
      change_window_end: ${{ vars.PROD_CHANGE_WINDOW_END_UTC }}
    secrets:
      aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
      discord_webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
      grafana_admin_password: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
