apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: aws-retail-store-sample-app
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/AndrewDoan01/aws-failover-zero-downtime
  ref:
    branch: main
  secretRef:
    name: github-credentials
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: catalog-test
  namespace: flux-system
spec:
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: aws-retail-store-sample-app
  path: ./deploy/clusters/test
  prune: true
  wait: true
  timeout: 5m
  targetNamespace: retail-store-sample-test
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: catalog-staging
  namespace: flux-system
spec:
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: aws-retail-store-sample-app
  path: ./deploy/clusters/staging
  prune: true
  wait: true
  timeout: 5m
  targetNamespace: retail-store-sample-staging
  dependsOn:
    - name: catalog-test
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: catalog-prod
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: aws-retail-store-sample-app
  path: ./deploy/clusters/prod
  prune: true
  wait: true
  timeout: 5m
  targetNamespace: retail-store-sample-prod
  dependsOn:
    - name: catalog-staging
