apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: retail-store-sample-prod
resources:
  - namespace.yaml
  - ../../services/catalog/base
  - ../../services/cart/base
  - ../../services/checkout/base
  - ../../services/orders/base
  - ../../services/ui/base
replicas:
  - name: carts
    count: 1
  - name: checkout
    count: 1
  - name: orders
    count: 1
  - name: ui
    count: 4
  - name: catalog
    count: 4

images:
  - name: 339140803989.dkr.ecr.ap-southeast-1.amazonaws.com/aws-retail-store-sample-app
    newName: 339140803989.dkr.ecr.ap-southeast-1.amazonaws.com/aws-retail-store-sample-app-catalog
    newTag: prod-v1.0.4 # {"$imagepolicy": "flux-system:catalog-prod:tag"}
    digest: "sha256:83498fbad237a85f882d724641e56137ee8868558b1f71f445b816eb5024e486" # {"$imagepolicy": "flux-system:catalog-prod:digest"}
  - name: public.ecr.aws/aws-containers/retail-store-sample-cart
    newName: 339140803989.dkr.ecr.ap-southeast-1.amazonaws.com/aws-retail-store-sample-app-cart
    newTag: prod-v1.0.4 # {"$imagepolicy": "flux-system:cart-prod:tag"}
  - name: public.ecr.aws/aws-containers/retail-store-sample-checkout
    newName: 339140803989.dkr.ecr.ap-southeast-1.amazonaws.com/aws-retail-store-sample-app-checkout
    newTag: prod-v1.0.4 # {"$imagepolicy": "flux-system:checkout-prod:tag"}
  - name: public.ecr.aws/aws-containers/retail-store-sample-orders
    newName: 339140803989.dkr.ecr.ap-southeast-1.amazonaws.com/aws-retail-store-sample-app-orders
    newTag: prod-v1.0.4 # {"$imagepolicy": "flux-system:orders-prod:tag"}
  - name: public.ecr.aws/aws-containers/retail-store-sample-ui
    newName: 339140803989.dkr.ecr.ap-southeast-1.amazonaws.com/aws-retail-store-sample-app-ui
    newTag: prod-v1.0.4 # {"$imagepolicy": "flux-system:ui-prod:tag"}

patches:
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: carts
      spec:
        template:
          spec:
            containers:
              - name: carts
                resources:
                  requests:
                    cpu: 500m
                    memory: 1Gi
                  limits:
                    cpu: "1"
                    memory: 2Gi
  - patch: |
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: carts
      spec:
        minReplicas: 1
  - patch: |
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: checkout
      spec:
        minReplicas: 1
  - patch: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: orders
      data:
        RETAIL_ORDERS_PERSISTENCE_PROVIDER: postgres
        RETAIL_ORDERS_PERSISTENCE_ENDPOINT: ha-db-postgres.clsgq4wuo1y4.ap-southeast-1.rds.amazonaws.com:5432
        RETAIL_ORDERS_PERSISTENCE_NAME: orders
        RETAIL_ORDERS_PERSISTENCE_USERNAME: postgres
        RETAIL_ORDERS_PERSISTENCE_PASSWORD: Doanquocan#2005




