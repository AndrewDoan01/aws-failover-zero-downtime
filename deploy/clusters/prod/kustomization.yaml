apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: retail-store-sample-prod

resources:
  - namespace.yaml
  - ../../base

images:
  - name: aws-retail-store-sample-app
    newTag: prod # {"$imagepolicy": "flux-system:catalog-prod:tag"}
    digest: "" # {"$imagepolicy": "flux-system:catalog-prod:digest"}

patches:
  - path: deployment-patch.yaml
  - path: configmap-patch.yaml
  - path: ingress-patch.yaml
