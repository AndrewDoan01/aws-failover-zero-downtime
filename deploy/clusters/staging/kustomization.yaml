apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: retail-store-sample-staging

resources:
  - namespace.yaml
  - ../../services/catalog/base
  - ../../services/cart/base
  - ../../services/checkout/base
  - ../../services/orders/base
  - ../../services/ui/base

images:
