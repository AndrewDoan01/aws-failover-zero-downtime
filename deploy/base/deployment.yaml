apiVersion: apps/v1
kind: Deployment
metadata:
  name: retail-store-sample-app
  labels:
    app.kubernetes.io/name: retail-store-sample-app
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: retail-store-sample-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: retail-store-sample-app
    spec:
      containers:
        - name: app
          image: ghcr.io/example/retail-store-sample-app:0.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: retail-store-sample-app-config
