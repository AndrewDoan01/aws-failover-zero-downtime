apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: catalog-test
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: catalog-app-repo
  filterTags:
    pattern: '^test-v(?P<version>[0-9]+\.[0-9]+\.[0-9]+.*)$'
    extract: '$version'
  policy:
    semver:
      range: '>=1.0.0'
  digestReflectionPolicy: IfNotPresent
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: catalog-staging
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: catalog-app-repo
  filterTags:
    pattern: '^staging-v(?P<version>[0-9]+\.[0-9]+\.[0-9]+.*)$'
    extract: '$version'
  policy:
    semver:
      range: '>=1.0.0'
  digestReflectionPolicy: IfNotPresent
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: catalog-prod
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: catalog-app-repo
  filterTags:
    pattern: '^prod-v(?P<version>[0-9]+\.[0-9]+\.[0-9]+.*)$'
    extract: '$version'
  policy:
    semver:
      range: '>=1.0.0'
  digestReflectionPolicy: Always
  interval: 5m
