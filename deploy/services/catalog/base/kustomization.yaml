apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: default

commonLabels:
  app.kubernetes.io/name: catalog
  app.kubernetes.io/managed-by: kustomize

resources:
  - deployment.yaml
  - service.yaml
  - configmap.yaml
  - ingress.yaml

images:
  - name: ghcr.io/aws/aws-retail-store-sample-app/catalog
    newName: ghcr.io/aws/aws-retail-store-sample-app/catalog
    newTag: 0.0.0
