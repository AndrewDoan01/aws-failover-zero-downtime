apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: test

bases:
  - ../../base

commonLabels:
  environment: test

replicas:
  - name: catalog
    count: 1

configMapGenerator:
  - name: catalog-config
    behavior: merge
    literals:
      - LOG_LEVEL=debug
      - DATABASE_ENABLED=true
      - CACHE_ENABLED=false

patchesStrategicMerge:
  - deployment-patch.yaml

images:
  - name: ghcr.io/aws/aws-retail-store-sample-app/catalog
    newTag: test-latest
